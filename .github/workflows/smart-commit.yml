name: Intelligent Contribution System

on:
  schedule:
    - cron: '0 9-18 * * *'
  workflow_dispatch:
    inputs:
      intensity:
        description: 'Commit frequency'
        required: true
        default: 'normal'
        type: choice
        options:
          - minimal
          - normal
          - aggressive

env:
  COMMIT_MINIMAL: 1
  COMMIT_NORMAL: 3
  COMMIT_AGGRESSIVE: 8

jobs:
  calculate-strategy:
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.strategy.outputs.count }}
      should_run: ${{ steps.strategy.outputs.run }}
    
    steps:
      - name: Determine commit strategy
        id: strategy
        run: |
          DAY_OF_WEEK=$(date +%u)
          RANDOM_CHANCE=$((RANDOM % 100))
          
          if [[ $DAY_OF_WEEK -gt 5 && $RANDOM_CHANCE -lt 15 ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Taking weekend off like a human"
            exit 0
          fi
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            COUNT_VAR="COMMIT_${{ github.event.inputs.intensity }}"
            COUNT=${!COUNT_VAR}
          else
            COUNT=$((RANDOM % 4 + 1))
          fi
          
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "run=true" >> $GITHUB_OUTPUT

  execute-commits:
    needs: calculate-strategy
    if: needs.calculate-strategy.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    strategy:
      matrix:
        iteration: [1, 2, 3, 4, 5]
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Generate commit persona
        id: persona
        run: |
          PREFIXES=("feat" "fix" "docs" "style" "refactor" "test" "chore")
          PREFIX=${PREFIXES[$RANDOM % ${#PREFIXES[@]}]}
          MESSAGES=("update config" "sync data" "bump version" "cleanup" "optimize" "lint")
          MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          echo "message=$PREFIX: $MSG [automated]" >> $GITHUB_OUTPUT
      
      - name: Execute commit
        run: |
          git config user.name "DevOps Bot"
          git config user.email "devops@company.internal"
          
          if [[ $((RANDOM % 3)) -eq 0 ]]; then
            echo "# $(date)" >> .activity.log
            git add .activity.log
            git commit -m "${{ steps.persona.outputs.message }}"
          else
            git commit --allow-empty -m "${{ steps.persona.outputs.message }}"
          fi
          git push
