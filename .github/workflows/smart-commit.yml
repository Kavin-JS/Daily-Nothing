name: Intelligent Contribution System

on:
  schedule:
    - cron: '0 9-18 * * *'
  workflow_dispatch:
    inputs:
      intensity:
        description: 'Commit frequency'
        required: true
        default: 'normal'
        type: choice
        options:
          - minimal
          - normal
          - aggressive

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Determine commit count
        id: strategy
        run: |
          DAY_OF_WEEK=$(date +%u)
          RANDOM_CHANCE=$((RANDOM % 100))
          
          # Weekend off chance
          if [[ $DAY_OF_WEEK -gt 5 && $RANDOM_CHANCE -lt 15 ]]; then
            echo "count=0" >> $GITHUB_OUTPUT
            echo "Skipping weekend"
            exit 0
          fi
          
          # Set count based on input or random
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.intensity }}" in
              minimal) COUNT=1 ;;
              normal) COUNT=3 ;;
              aggressive) COUNT=8 ;;
            esac
          else
            COUNT=$((RANDOM % 4 + 1))
          fi
          
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Will make $COUNT commits"
      
      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
      
      - name: Execute commits
        if: steps.strategy.outputs.count != '0'
        run: |
          COUNT=${{ steps.strategy.outputs.count }}
          
          for i in $(seq 1 $COUNT); do
            # Generate random commit message
            PREFIXES=("feat" "fix" "docs" "style" "refactor" "test" "chore")
            MESSAGES=("update config" "sync data" "bump version" "cleanup" "optimize" "lint")
            PREFIX=${PREFIXES[$RANDOM % ${#PREFIXES[@]}]}
            MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
            
            # 30% chance to touch a file, 70% empty commit
            if [[ $((RANDOM % 10)) -lt 3 ]]; then
              echo "# $(date)" >> .activity.log
              git add .activity.log
              git commit -m "$PREFIX: $MSG [automated]"
            else
              git commit --allow-empty -m "$PREFIX: $MSG [automated]"
            fi
            
            # Random delay 30-180 seconds between commits
            if [[ $i -lt $COUNT ]]; then
              DELAY=$((RANDOM % 150 + 30))
              echo "Waiting ${DELAY}s before next commit..."
              sleep $DELAY
            fi
          done
          
          git push
