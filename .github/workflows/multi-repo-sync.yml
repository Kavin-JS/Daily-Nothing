name: Cross-Repository Contribution Network

on:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync-contributions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: 
          - owner/repo-1
          - owner/repo-2
          - owner/repo-3
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GH_PAT }}
          path: target
      
      - name: Create shadow commit
        working-directory: target
        run: |
          git config user.name "Sync Bot"
          git config user.email "sync@bot.local"
          mkdir -p .github
          date -Iseconds > .github/.last-sync
          git add .
          git commit -m "ci: synchronize state [$(date +%s)]" || \
          git commit --allow-empty -m "ci: heartbeat signal"
          git push
